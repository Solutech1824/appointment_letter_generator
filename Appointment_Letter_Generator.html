<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Bulk Appointment Letter Generator</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    background:#f4f4f4;
    margin:0;
    padding:0;
    font-family:Arial, sans-serif;
}

.card{
    border-radius:12px;
}

.table th,
.table td{
    vertical-align:middle;
    font-size:14px;
}

input,
select{
    min-width:140px;
}

#letterContainer{
    display:none;
    margin:0;
    padding:0;
}

.letter-page{
    width:210mm;
    min-height:auto;
    background:white;
    padding:10mm 12mm 10mm 12mm;
    margin:0 auto;
    page-break-after:always;
    font-family:Arial, sans-serif;
    line-height:1.5;
    color:#000;
    box-sizing:border-box;
}

.letterhead{
    text-align:center;
    margin-bottom:15px;
}

.letterhead h3{
    margin:0;
    font-weight:bold;
    font-size:22px;
}

.table-bordered td,
.table-bordered th{
    border:1px solid #000 !important;
}

.small-text{
    font-size:13px;
}

.signature-section{
    margin-top:50px;
}

p{
    margin-bottom:10px;
}

h4,h5{
    margin-top:15px;
    margin-bottom:10px;
}

@media print{

    body{
        background:white;
    }

    .no-print{
        display:none;
    }

    .letter-page{
        margin:0;
        box-shadow:none;
    }
}

</style>
</head>

<body>

<div class="container-fluid py-4">

<div class="card shadow-sm no-print">

<div class="card-body">

<h3 class="mb-4">
Bulk Appointment Letter Generator
</h3>

<div class="row">

<div class="col-md-3 mb-3">
<label class="form-label">Unit Name</label>
<input type="text" class="form-control" id="unitName">
</div>

<div class="col-md-3 mb-3">
<label class="form-label">Address</label>
<input type="text" class="form-control" id="unitAddress">
</div>

<div class="col-md-2 mb-3">
<label class="form-label">Email</label>
<input type="text" class="form-control" id="email">
</div>

<div class="col-md-2 mb-3">
<label class="form-label">Contact No.</label>
<input type="text" class="form-control" id="contact">
</div>

<div class="col-md-2 mb-3">
<label class="form-label">Authorized Signatory</label>
<input type="text" class="form-control" id="signatory">
</div>

</div>

<hr>

<div class="table-responsive">

<table class="table table-bordered align-middle" id="workerTable">

<thead class="table-dark">

<tr>
<th width="5%">SL</th>
<th>Worker Name</th>
<th>Address</th>
<th>Employment Type</th>
<th>Joining Date</th>
<th>Issue Date</th>
<th width="8%">Action</th>
</tr>

</thead>

<tbody id="tableBody">

<tr>

<td>1</td>

<td>
<input type="text" class="form-control workerName">
</td>

<td>
<input type="text" class="form-control workerAddress">
</td>

<td>
<select class="form-select employmentType">
<option>স্থায়ী</option>
<option>অস্থায়ী</option>
<option>চুক্তিবদ্ধ</option>
</select>
</td>

<td>
<input type="date" class="form-control joiningDate">
</td>

<td>
<input type="date" class="form-control issueDate">
</td>

<td class="text-center">
<button class="btn btn-danger btn-sm"
onclick="removeRow(this)">
X
</button>
</td>

</tr>

</tbody>

</table>

</div>

<div class="mt-3">

<button class="btn btn-primary"
onclick="addRow()">
Add Row
</button>

<button class="btn btn-success"
onclick="generateLetters()">
Generate Appointment Letters
</button>

<button class="btn btn-danger"
onclick="downloadPDF()">
Download PDF
</button>

</div>

</div>

</div>

</div>

<div id="letterContainer"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<script>

function addRow(){

let table =
document.getElementById("tableBody");

let rowCount =
table.rows.length + 1;

let row = `

<tr>

<td>${rowCount}</td>

<td>
<input type="text"
class="form-control workerName">
</td>

<td>
<input type="text"
class="form-control workerAddress">
</td>

<td>
<select class="form-select employmentType">
<option>স্থায়ী</option>
<option>অস্থায়ী</option>
<option>চুক্তিবদ্ধ</option>
</select>
</td>

<td>
<input type="date"
class="form-control joiningDate">
</td>

<td>
<input type="date"
class="form-control issueDate">
</td>

<td class="text-center">
<button class="btn btn-danger btn-sm"
onclick="removeRow(this)">
X
</button>
</td>

</tr>

`;

table.insertAdjacentHTML('beforeend', row);

}

function removeRow(button){

button.closest("tr").remove();

updateSerialNumbers();

}

function updateSerialNumbers(){

let rows =
document.querySelectorAll("#tableBody tr");

rows.forEach((row,index)=>{

row.cells[0].innerText =
index + 1;

});

}

function generateLetters(){

let container =
document.getElementById("letterContainer");

container.innerHTML = "";

let unitName =
document.getElementById("unitName").value;

let unitAddress =
document.getElementById("unitAddress").value;

let email =
document.getElementById("email").value;

let contact =
document.getElementById("contact").value;

let signatory =
document.getElementById("signatory").value;

let rows =
document.querySelectorAll("#tableBody tr");

rows.forEach((row)=>{

let workerName =
row.querySelector(".workerName").value;

let workerAddress =
row.querySelector(".workerAddress").value;

let employmentType =
row.querySelector(".employmentType").value;

let joiningDate =
row.querySelector(".joiningDate").value;

let issueDate =
row.querySelector(".issueDate").value;

let letter = `

<div class="letter-page">

<div class="letterhead">

<h3>${unitName}</h3>

<div>${unitAddress}</div>

<div>${email}</div>

<div>${contact}</div>

</div>

<hr>

<h4 class="text-center mb-4">
নিযুক্তি পত্ৰ
</h4>

<p>
<strong>শ্ৰমিকৰ নাম:</strong>
${workerName}
</p>

<p>
<strong>শ্ৰমিকৰ ঠিকনা:</strong>
${workerAddress}
</p>

<p>
প্ৰিয় ${workerName},
</p>

<p>
আমি আপোনাক ${unitName}ত,
তলত দিয়া চৰ্ত আৰু নিয়মৰ অধীনত
নিযুক্তি দিছো:
</p>

<h5>
১/ নিয়োগৰ বিৱৰণ
</h5>

<table class="table table-bordered">

<tr>
<th>সবিশেষ</th>
<th>বিৱৰণ</th>
</tr>

<tr>
<td>নিয়োগৰ প্ৰকাৰ</td>
<td>${employmentType}</td>
</tr>

<tr>
<td>যোগদানৰ তাৰিখ</td>
<td>${joiningDate}</td>
</tr>

<tr>
<td>মজুৰি</td>
<td>
চৰকাৰী নূন্যতম মজুৰিৰ নিয়ম অনুসৰি।
</td>
</tr>

</table>

<h5>
২/ ভূমিকা আৰু দায়িত্ব
</h5>

<table class="table table-bordered small-text">

<tr>
<th width="10%">ক্ৰমিক</th>
<th>মূল দায়িত্বসমূহ</th>
</tr>

<tr>
<td>১</td>
<td>
প্ৰক্ৰিয়াকৰণ, কাৰখানাৰ কাম-কাজ,
ৰক্ষণাবেক্ষণ আদিৰ লগত জড়িত
নিৰ্ধাৰিত কামবোৰ সম্পন্ন কৰা।
</td>
</tr>

<tr>
<td>২</td>
<td>
সকলো সময়তে সুৰক্ষা আৰু
পৰিষ্কাৰ-পৰিচ্ছন্নতাৰ প্ৰট’কল
মানি চলা।
</td>
</tr>

<tr>
<td>৩</td>
<td>
কৰ্মক্ষেত্ৰৰ যিকোনো বিপদ,
যন্ত্ৰপাতিৰ সমস্যা বা কাণ্ডৰ বিষয়ে
তত্বাৱধায়কক জনোৱা।
</td>
</tr>

<tr>
<td>৪</td>
<td>
কোম্পানী নিয়ম, শ্ৰম আইন,
আৰু SOP অনুসৰণ নিশ্চিত কৰা।
</td>
</tr>

<tr>
<td>৫</td>
<td>
উপস্থিতি আৰু সময়মতে কাম কৰা।
</td>
</tr>

</table>

<h5>
৩/ শ্ৰমিকৰ অধিকাৰ আৰু সুবিধা
</h5>

<table class="table table-bordered small-text">

<tr>
<th width="25%">অধিকাৰ</th>
<th>সবিশেষ</th>
</tr>

<tr>
<td>মজুৰি</td>
<td>
নূন্যতম মজুৰি আইন অনুসৰি।
</td>
</tr>

<tr>
<td>কৰ্মৰ সময়</td>
<td>
প্ৰতিদিনে ৮ ঘণ্টা;
আইন অনুসৰি OT।
</td>
</tr>

<tr>
<td>সাপ্তাহিক বন্ধ</td>
<td>
প্ৰতি সপ্তাহত এদিন ছুটী।
</td>
</tr>

<tr>
<td>পি এফ</td>
<td>
ATEPFO অনুসৰি সুবিধা।
</td>
</tr>

<tr>
<td>গ্ৰেচুইটি</td>
<td>
আইন অনুসৰি।
</td>
</tr>

<tr>
<td>ছুটী</td>
<td>
উপাৰ্জিত, অসুস্থতা আৰু
প্ৰসূতি ছুটী।
</td>
</tr>

</table>

<p>
আপুনি কাৰখানা/বাগিচাৰ
নিয়ম-নীতি মানি চলিব লাগিব।
</p>

<p>
আপোনাৰ গ্ৰহণযোগ্যতাৰ চিন হিচাপে
এই চিঠিখনৰ প্ৰতিলিপি স্বাক্ষৰ কৰি
ঘূৰাই দিয়ক।
</p>

<div class="signature-section">

<div class="row">

<div class="col-6">

<br><br>

_________________________<br>

শ্ৰমিকৰ গ্ৰহণযোগ্যতা

</div>

<div class="col-6 text-end">

${signatory}<br>

অনুমোদিত স্বাক্ষৰকাৰী<br>

তাৰিখ:
${issueDate}

</div>

</div>

</div>

</div>

`;

container.innerHTML += letter;

});

container.style.display = "block";

window.scrollTo(0,document.body.scrollHeight);

}

function downloadPDF(){

generateLetters();

let element =
document.getElementById("letterContainer");

let options = {

margin:[0,0,0,0],

filename:'Bulk_Appointment_Letters.pdf',

image:{
type:'jpeg',
quality:1
},

html2canvas:{
scale:2,
scrollY:0,
useCORS:true
},

jsPDF:{
unit:'mm',
format:'a4',
orientation:'portrait'
}

};

html2pdf()
.set(options)
.from(element)
.save();

}

</script>

</body>
</html>
